services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=sqlite+aiosqlite:///./homepilot.db
      - CHROMA_PERSIST_DIR=./chroma_data
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - backend_data:/app/chroma_data
      - backend_db:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_db:
